<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | IT Troubleshooting KnowledgeBase</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/animations.css" />
</head>

<body>
    <nav class="navbar">
        <div class="logo">KnowledBase</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>

    <header class="hero small-hero">
        <h1 class="hero-title">Login</h1>
        <p class="hero-paragraph">Sign in to contribute and access exclusive features.</p>
    </header>

    <section class="form-section">
        <form class="auth-form">
            <input type="email" placeholder="Email" required />
            <input type="password" placeholder="Password" required />
            <button type="submit">Login</button>
            <a href="#" class="forgot-password">Forgot Password?</a>
            <div class="social-login">
                <button type="button">Sign in with Google</button>
                <button type="button">Sign in with GitHub</button>
                <button type="button">Sign in with LinkedIn</button>
            </div>
        </form>
    </section>

    <footer>
        <p>© 2025 ITKB Project | All Rights Reserved</p>
    </footer>

    <script src="js/auth.js"></script>
</body>

</html>
